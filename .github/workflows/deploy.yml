name: Build, Push & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: self-hosted   # AES self-hosted runner

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Fix Docker socket permissions (ensures runner user can access Docker)
      - name: Fix Docker socket permissions
        run: |
          if ! docker info > /dev/null 2>&1; then
            echo "Docker not accessible as current user, trying with sudo..."
            sudo chmod 666 /var/run/docker.sock
          else
            echo "Docker accessible ✅"
          fi

      # ── 3. Log in to Docker Hub ───────────────────────────────────────────────
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ── 4. Build & push image ─────────────────────────────────────────────────
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/agent-stream-voice-agent:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/agent-stream-voice-agent:latest

      # ── 5. Stop & remove old container ───────────────────────────────────────
      - name: Stop and remove old container
        run: |
          docker rm -f voice-bot-container || true

      # ── 6. Run new container — all env vars from GitHub Secrets ───────────────
      - name: Run Docker container on port 5002
        run: |
          docker run -d \
            --name voice-bot-container \
            --restart always \
            -p 5002:5002 \
            \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e OPENAI_MODEL="${{ secrets.OPENAI_MODEL }}" \
            -e OPENAI_VOICE="${{ secrets.OPENAI_VOICE }}" \
            \
            -e SERVER_HOST="0.0.0.0" \
            -e SERVER_PORT="5002" \
            \
            -e COMPANY_NAME="${{ secrets.COMPANY_NAME }}" \
            -e SALES_BOT_NAME="${{ secrets.SALES_BOT_NAME }}" \
            \
            -e SAMPLE_RATE="${{ secrets.SAMPLE_RATE }}" \
            -e AUDIO_CHUNK_SIZE="${{ secrets.AUDIO_CHUNK_SIZE }}" \
            -e LOG_LEVEL="${{ secrets.LOG_LEVEL }}" \
            \
            -e USE_SIP_TRUNK="${{ secrets.USE_SIP_TRUNK }}" \
            -e INBOUND_SIP_ENABLED="${{ secrets.INBOUND_SIP_ENABLED }}" \
            -e SIP_PUBLIC_IP="${{ secrets.SIP_PUBLIC_IP }}" \
            \
            -e EXOTEL_API_TOKEN="${{ secrets.EXOTEL_API_TOKEN }}" \
            -e EXOTEL_ACCOUNT_SID="${{ secrets.EXOTEL_ACCOUNT_SID }}" \
            -e EXOTEL_FROM_NUMBER="${{ secrets.EXOTEL_FROM_NUMBER }}" \
            \
            -e OUTBOUND_SIP_ENABLED="${{ secrets.OUTBOUND_SIP_ENABLED }}" \
            -e SIP_USERNAME="${{ secrets.SIP_USERNAME }}" \
            -e SIP_PASSWORD="${{ secrets.SIP_PASSWORD }}" \
            -e SIP_REALM="${{ secrets.SIP_REALM }}" \
            -e EXOTEL_OUTBOUND_PROXY="${{ secrets.EXOTEL_OUTBOUND_PROXY }}" \
            \
            ${{ secrets.DOCKER_USERNAME }}/agent-stream-voice-agent:latest

      # ── 7. Verify container is running ────────────────────────────────────────
      - name: Verify container health
        run: |
          echo "Waiting for container to start..."
          sleep 10
          docker ps --filter "name=voice-bot-container" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
