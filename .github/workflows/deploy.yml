name: Voice Agent CI/CD

on:
  push:
    branches:
      - main

jobs:
  # ── CI: Build & Push on GitHub-hosted runner ─────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build Docker image
        run: |
          docker build \
            --build-arg OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --build-arg OPENAI_MODEL="${{ secrets.OPENAI_MODEL }}" \
            --build-arg OPENAI_VOICE="${{ secrets.OPENAI_VOICE }}" \
            --build-arg SERVER_HOST="0.0.0.0" \
            --build-arg SERVER_PORT="5002" \
            --build-arg COMPANY_NAME="${{ secrets.COMPANY_NAME }}" \
            --build-arg SALES_BOT_NAME="${{ secrets.SALES_BOT_NAME }}" \
            --build-arg SAMPLE_RATE="${{ secrets.SAMPLE_RATE }}" \
            --build-arg AUDIO_CHUNK_SIZE="${{ secrets.AUDIO_CHUNK_SIZE }}" \
            --build-arg LOG_LEVEL="${{ secrets.LOG_LEVEL }}" \
            --build-arg USE_SIP_TRUNK="${{ secrets.USE_SIP_TRUNK }}" \
            --build-arg INBOUND_SIP_ENABLED="${{ secrets.INBOUND_SIP_ENABLED }}" \
            --build-arg SIP_PUBLIC_IP="${{ secrets.SIP_PUBLIC_IP }}" \
            --build-arg EXOTEL_API_TOKEN="${{ secrets.EXOTEL_API_TOKEN }}" \
            --build-arg EXOTEL_ACCOUNT_SID="${{ secrets.EXOTEL_ACCOUNT_SID }}" \
            --build-arg EXOTEL_FROM_NUMBER="${{ secrets.EXOTEL_FROM_NUMBER }}" \
            --build-arg OUTBOUND_SIP_ENABLED="${{ secrets.OUTBOUND_SIP_ENABLED }}" \
            --build-arg SIP_USERNAME="${{ secrets.SIP_USERNAME }}" \
            --build-arg SIP_PASSWORD="${{ secrets.SIP_PASSWORD }}" \
            --build-arg SIP_REALM="${{ secrets.SIP_REALM }}" \
            --build-arg EXOTEL_OUTBOUND_PROXY="${{ secrets.EXOTEL_OUTBOUND_PROXY }}" \
            -t ${{ secrets.DOCKER_USERNAME }}/agent-stream-voice-agent:latest .

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/agent-stream-voice-agent:latest

  # ── CD: Deploy on AES self-hosted runner ─────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Authenticate DockerHub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo $DOCKER_PASSWORD | sudo docker login -u $DOCKER_USERNAME --password-stdin

      - name: Pull Docker image
        timeout-minutes: 5
        run: |
          for attempt in 1 2 3; do
            if sudo docker pull ${{ secrets.DOCKER_USERNAME }}/agent-stream-voice-agent:latest; then
              exit 0
            fi
            echo "Docker pull failed (attempt ${attempt}/3)."
            if [ "$attempt" -lt 3 ]; then
              sleep 15
            fi
          done
          echo "Docker pull failed after 3 attempts."
          exit 1

      - name: Stop and remove old container
        run: sudo docker rm -f voice-bot-container || true

      - name: Run Docker container on port 5002
        run: |
          sudo docker run -d \
            --name voice-bot-container \
            --restart always \
            -p 5002:5002 \
            -p 5060:5060 \
            -p 5060:5060/udp \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e OPENAI_MODEL="${{ secrets.OPENAI_MODEL }}" \
            -e OPENAI_VOICE="${{ secrets.OPENAI_VOICE }}" \
            -e SERVER_HOST="0.0.0.0" \
            -e SERVER_PORT="5002" \
            -e COMPANY_NAME="${{ secrets.COMPANY_NAME }}" \
            -e SALES_BOT_NAME="${{ secrets.SALES_BOT_NAME }}" \
            -e SAMPLE_RATE="${{ secrets.SAMPLE_RATE }}" \
            -e AUDIO_CHUNK_SIZE="${{ secrets.AUDIO_CHUNK_SIZE }}" \
            -e LOG_LEVEL="${{ secrets.LOG_LEVEL }}" \
            -e USE_SIP_TRUNK="${{ secrets.USE_SIP_TRUNK }}" \
            -e INBOUND_SIP_ENABLED="${{ secrets.INBOUND_SIP_ENABLED }}" \
            -e SIP_PUBLIC_IP="${{ secrets.SIP_PUBLIC_IP }}" \
            -e EXOTEL_API_TOKEN="${{ secrets.EXOTEL_API_TOKEN }}" \
            -e EXOTEL_ACCOUNT_SID="${{ secrets.EXOTEL_ACCOUNT_SID }}" \
            -e EXOTEL_FROM_NUMBER="${{ secrets.EXOTEL_FROM_NUMBER }}" \
            -e OUTBOUND_SIP_ENABLED="${{ secrets.OUTBOUND_SIP_ENABLED }}" \
            -e SIP_USERNAME="${{ secrets.SIP_USERNAME }}" \
            -e SIP_PASSWORD="${{ secrets.SIP_PASSWORD }}" \
            -e SIP_REALM="${{ secrets.SIP_REALM }}" \
            -e EXOTEL_OUTBOUND_PROXY="${{ secrets.EXOTEL_OUTBOUND_PROXY }}" \
            ${{ secrets.DOCKER_USERNAME }}/agent-stream-voice-agent:latest

      - name: Verify container is running
        run: |
          sleep 5
          sudo docker ps --filter "name=voice-bot-container" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
