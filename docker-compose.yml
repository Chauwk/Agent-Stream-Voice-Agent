version: '3.8'

services:
  voice-bot:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: voice-bot
    
    environment:
      # SIP Configuration
      - USE_SIP_TRUNK=true
      - SIP_SERVER_PORT=5060
      - SIP_SERVER_HOST=0.0.0.0
      - INBOUND_SIP_ENABLED=true
      
      # Outbound SIP (optional)
      - OUTBOUND_SIP_ENABLED=false
      - SIP_REALM=exotel.com
      - EXOTEL_OUTBOUND_PROXY=proxy.exotel.in:5060
      
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-realtime-preview-2024-12-17
      - OPENAI_VOICE=coral
      
      # Bot Personality
      - COMPANY_NAME=${COMPANY_NAME:-Your Company}
      - SALES_BOT_NAME=${SALES_BOT_NAME:-Sarah}
      - SALES_REP_NAME=${SALES_BOT_NAME:-Sarah}
      
      # Audio
      - SAMPLE_RATE=24000
      - AUDIO_CHUNK_SIZE=200
      
      # Server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
      - LOG_LEVEL=INFO
      
      # Production
      - PRODUCTION_MODE=true
    
    # Use .env file for secrets
    env_file: .env
    
    ports:
      - "5060:5060/tcp"
      - "5060:5060/udp"
      - "5000:5000/tcp"  # WebSocket fallback (optional)
    
    restart: always
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 5060)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  voice-bot-data:
    driver: local
